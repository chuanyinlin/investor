<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D1620">
<title>Invest OS v1.3</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect width='120' height='120' rx='26' fill='%230D1620'/%3E%3Crect x='14' y='14' width='92' height='92' rx='16' fill='none' stroke='%2321D4B4' stroke-width='3'/%3E%3Ctext x='60' y='58' font-family='monospace' font-size='26' fill='%2321D4B4' text-anchor='middle' font-weight='700'%3EINVEST%3C/text%3E%3Ctext x='60' y='86' font-family='monospace' font-size='16' fill='%23FFB020' text-anchor='middle' letter-spacing='2'%3EOS%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0B131C;
    --bg-grad:#0D1B26;
    --panel:#141F2B;
    --panel-2:#1B2938;
    --panel-3:#0F1822;
    --hair: rgba(255,255,255,0.07);
    --hair-strong: rgba(255,255,255,0.14);
    --text: #E8EEF3;
    --text-dim: #8CA0B2;
    --text-faint: #57697A;
    --amber:#FFB020;
    --amber-dim: rgba(255,176,32,0.14);
    --teal:#22D3AE;
    --teal-dim: rgba(34,211,174,0.14);
    --red:#FF5C6C;
    --red-dim: rgba(255,92,108,0.14);
    --led-off:#25303B;
    --font-ui: -apple-system, BlinkMacSystemFont, "PingFang TC", "Helvetica Neue", "Microsoft JhengHei", sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Menlo", "JetBrains Mono", monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family: var(--font-ui);
    background:
      radial-gradient(1200px 600px at 50% -10%, var(--bg-grad), var(--bg) 60%);
    color: var(--text);
    min-height:100vh;
    padding-bottom: calc(28px + env(safe-area-inset-bottom));
  }
  .app{
    max-width: 480px;
    margin: 0 auto;
    padding: calc(14px + env(safe-area-inset-top)) 14px 0;
  }

  /* ---------- Header ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 14px;
  }
  .brand{ display:flex; flex-direction:column; }
  .brand .wordmark{
    font-family: var(--font-mono);
    font-size: 28px; font-weight:700; letter-spacing: 1px;
    color: var(--text);
    text-shadow: 0 0 14px rgba(232,238,243,0.4);
  }
  .brand .wordmark span{ color: var(--text); text-shadow: 0 0 14px rgba(232,238,243,0.4); }
  .brand .tagline{ font-size:11px; color:var(--text-faint); margin-top:2px; letter-spacing:0.5px;}
  .icon-btn{
    width:38px; height:38px; border-radius:11px;
    background: var(--bg); border:none;
    display:flex; align-items:center; justify-content:center;
    color: var(--text); font-size:17px;
  }
  .icon-btn:active{ opacity:0.85; }

  /* ---------- Hero status ---------- */
  .hero{
    border-radius: 20px;
    padding: 18px 18px 16px;
    margin-bottom: 16px;
    border: 1px solid var(--hair-strong);
    position: relative;
    overflow:hidden;
    min-height: 130px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .hero .eyebrow{
    font-family: var(--font-mono);
    font-size: 10.5px; line-height:13px; letter-spacing: 1.6px; text-transform:uppercase;
    color: var(--text-dim); margin-bottom:8px;
  }
  .hero .headline{
    font-size: 21px; font-weight:700; line-height:28px;
  }
  .hero .sub{ font-size:12.5px; line-height:18px; color:var(--text-dim); margin-top:6px; }
  .hero.st-idle{ background: linear-gradient(160deg, var(--panel), var(--panel-3)); }
  .hero.st-idle .headline{ color: var(--text); }
  .hero.st-momentum{ background: linear-gradient(160deg, var(--teal-dim), var(--panel-3)); border-color: rgba(34,211,174,0.35); }
  .hero.st-momentum .headline{ color: var(--teal); }
  .hero.st-bombard{ background: linear-gradient(160deg, var(--teal-dim), var(--panel-3)); border-color: rgba(34,211,174,0.35); }
  .hero.st-bombard .headline{ color: var(--teal); }
  .hero.st-exit{ background: linear-gradient(160deg, var(--red-dim), var(--panel-3)); border-color: rgba(255,92,108,0.4); }
  .hero.st-exit .headline{ color: var(--red); }
  .hero.st-defense{ background: linear-gradient(160deg, rgba(255,92,108,0.08), var(--panel-3)); border-color: rgba(255,92,108,0.25); }
  .hero.st-defense .headline{ color: var(--red); }
  .hero.st-warn{ background: linear-gradient(160deg, var(--amber-dim), var(--panel-3)); border-color: rgba(255,176,32,0.4); }
  .hero.st-warn .headline{ color: var(--amber); }

  /* ---------- Tabs ---------- */
  .tabs{
    display:flex; background: var(--panel); border:1px solid var(--hair);
    border-radius: 13px; padding:3px; margin-bottom:16px;
  }
  .tab{
    flex:1; text-align:center; padding:9px 0; border-radius:10px;
    font-size:13.5px; font-weight:600; color:var(--text-dim);
  }
  .tab.active{ background: var(--panel-2); color: var(--text); }

  /* ---------- Cards ---------- */
  .card{
    background: var(--panel);
    border:1px solid var(--hair);
    border-radius:16px;
    padding:14px 14px 15px;
    margin-bottom:14px;
  }
  .card-title{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:11px;
  }
  .card-title h3{
    margin:0; font-size:15.5px; font-weight:700; letter-spacing:0.3px;
    color: var(--text); text-transform:uppercase; font-family:var(--font-mono);
  }

  /* ---------- Inputs ---------- */
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .field{ margin-bottom:9px; }
  .field label{ display:block; font-size:11px; color:var(--text-faint); margin-bottom:4px; }
  .field input{
    width:100%; background: var(--panel-3); border:1px solid var(--hair);
    border-radius:10px; padding:10px 11px; color:var(--text);
    font-family: var(--font-mono); font-size:14.5px;
  }
  .field input:focus{ outline:none; border-color: var(--teal); }
  input[type="number"]{
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button{
    -webkit-appearance: none; margin:0;
  }
  .field input[type="file"]{
    padding:9px 10px; font-size:12px; color: var(--text-dim);
  }
  .field input[type="file"]::file-selector-button{
    background: var(--panel-3); color: var(--text-dim); border:1px solid var(--hair-strong);
    border-radius:8px; padding:6px 10px; font-size:11.5px; font-family: var(--font-ui);
    margin-right:10px; cursor:pointer;
  }
  .btn{
    width:100%; padding:12px; border-radius:12px; border:none;
    font-weight:700; font-size:14.5px; font-family:var(--font-ui);
    margin-top:2px;
  }
  .btn-primary{ background: var(--teal); color:#04231C; }
  .btn-primary:active{ opacity:0.85; }
  .btn-neutral{ background: var(--panel-2); color: var(--text); border:1px solid var(--hair-strong); }
  .btn-neutral:active{ background: var(--panel-3); }
  .btn-sm{
    width:auto; padding:7px 12px; font-size:12px; margin-top:0; border-radius:10px;
  }
  #toggleInput, #toggleAdvancedInput, #toggleHist, #toggleLed, #toggleReserve, #toggleOrders, #toggleBacktest{
    width:28px; height:28px; padding:0; font-size:17px; line-height:28px;
    text-align:center; flex-shrink:0;
    background: var(--panel); color: var(--text);
  }
  .chev{
    display:inline-block; font-size:13px;
    transition: transform 0.2s ease;
    transform: rotate(0deg);
  }
  .chev.collapsed{ transform: rotate(-90deg); }
  #btnAdd, #btnImportFile, #btnExportHist{
    display: table; margin: 14px 0 0 auto;
  }

  /* ---------- History list ---------- */
  .hist-entry{
    padding:10px 0; border-bottom:1px solid var(--hair);
  }
  .hist-entry:last-child{ border-bottom:none; }
  .hist-entry-head{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:8px;
  }
  .hist-entry-date{
    font-family: var(--font-mono); font-size:12.5px; font-weight:700; color:var(--text-dim);
  }
  .hist-entry-del{ color: var(--text-faint); font-size:15px; padding-left:10px; }
  .hist-grid2{ display:grid; grid-template-columns:1fr 1fr; gap:8px 9px; }
  .hist-grid2 + .hist-grid2{ margin-top:8px; }
  .hist-stat-label{ font-size:10px; color:var(--text-faint); margin-bottom:2px; }
  .hist-stat-value{ font-family: var(--font-mono); font-size:13px; color:var(--text); }
  .empty-hint{
    text-align:left; color:var(--text-faint); font-size:12.5px;
    padding: 14px 6px; line-height:1.6;
  }

  /* ---------- LED annunciator panel ---------- */
  .led-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:9px; align-items:start; }
  .led-col{ display:flex; flex-direction:column; gap:9px; }
  .led-col-title{ font-size:10.5px; color:var(--text-faint); letter-spacing:1px; text-transform:uppercase; margin-bottom:-2px; }
  .led{
    display:flex; align-items:center; gap:9px;
    background: var(--panel-3); border:1px solid var(--hair);
    border-radius:11px; padding:9px 10px;
  }
  .led .lamp{
    width:11px; height:11px; border-radius:50%;
    background: var(--led-off); flex-shrink:0;
  }
  .led.on .lamp{ background: var(--teal); box-shadow: 0 0 8px 1px rgba(34,211,174,0.75); }
  .led.on.amber .lamp{ background: var(--amber); box-shadow: 0 0 8px 1px rgba(255,176,32,0.75); }
  .led.on.red .lamp{ background: var(--red); box-shadow: 0 0 8px 1px rgba(255,92,108,0.75); }
  .led .label{ font-size:11.5px; line-height:1.3; color:var(--text-dim); }
  .led.on .label{ color: var(--text); }

  /* ---------- Order checklist ---------- */
  .order{
    display:flex; align-items:flex-start; gap:10px;
    padding:11px 0; border-bottom:1px solid var(--hair);
  }
  .order:last-child{ border-bottom:none; }
  .order .dot{
    width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0;
    background: var(--led-off);
  }
  .order.active .dot{ background: var(--teal); box-shadow: 0 0 6px 1px rgba(34,211,174,0.7); }
  .order .name{ font-size:13.5px; font-weight:600; }
  .order.active .name{ color: var(--text); }
  .order:not(.active) .name{ color: var(--text-faint); }
  .order .detail{ font-size:12px; color:var(--text-dim); margin-top:2px; font-family:var(--font-mono); }
  .order:not(.active) .detail{ color: var(--text-faint); }
  .order .cond{ font-size:10.5px; color:var(--text-faint); margin-top:2px; }

  /* ---------- Params modal ---------- */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,0.55);
    display:none; align-items:flex-end; z-index:50;
  }
  .modal-backdrop.show{ display:flex; }
  .modal{
    background: var(--panel); width:100%; max-width:480px; margin:0 auto;
    border-radius: 20px 20px 0 0; padding:16px 16px calc(20px + env(safe-area-inset-bottom));
    max-height: 82vh; overflow-y:auto;
    border-top:1px solid var(--hair-strong);
  }
  .modal h2{ font-size:15px; margin:2px 0 12px; font-family:var(--font-mono); }
  .param-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:9px 0; border-bottom:1px solid var(--hair); gap:10px;
  }
  .param-row .plabel{ font-size:12.5px; color:var(--text-dim); flex:1; }
  .param-row input{
    width:92px; text-align:right; background: var(--panel-3); border:1px solid var(--hair);
    border-radius:9px; padding:7px 9px; color:var(--text); font-family:var(--font-mono); font-size:13px;
  }
  .modal-close{ margin-top:14px; }

  .asset-card{
    background: var(--panel-3); border:1px solid var(--hair); border-radius:12px;
    padding:10px; margin-bottom:10px;
  }
  .asset-card .field{ margin-bottom:8px; }
  .asset-card select{
    width:100%; background: var(--panel-3); border:1px solid var(--hair);
    border-radius:10px; padding:10px 11px; color:var(--text);
    font-family: var(--font-ui); font-size:14px;
  }
  .asset-name-row{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .asset-name-row input{
    flex:1; background: var(--panel-2); border:1px solid var(--hair);
    border-radius:10px; padding:9px 10px; color:var(--text);
    font-family: var(--font-ui); font-size:14px; font-weight:700;
  }
  .order-btn{
    width:26px; height:26px; border-radius:8px; background: var(--panel-2);
    border:1px solid var(--hair-strong); display:flex; align-items:center; justify-content:center;
    color: var(--text); font-size:11px; flex-shrink:0;
  }
  .order-btn.disabled{ color: var(--text-faint); opacity:0.4; }
  .order-btn:active{ background: var(--panel-3); }

  .footer-note{
    text-align:center; font-size:10.5px; color:var(--text-faint);
    margin: 6px 0 4px; line-height:1.6;
  }
  .danger-link{ color: var(--red); text-decoration:underline; }

  /* ---------- Calendar popover ---------- */
  .field.date-field{ position:relative; }
  #inDate{ cursor:pointer; }
  .calendar-pop{
    position:absolute; top:calc(100% + 6px); left:0; right:0;
    background: var(--panel-2); border:1px solid var(--hair-strong);
    border-radius:14px; padding:12px; z-index:60;
    display:none; box-shadow:0 14px 32px rgba(0,0,0,0.5);
  }
  .calendar-pop.show{ display:block; }
  .cal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .cal-title{ font-family:var(--font-mono); font-size:13px; font-weight:700; color:var(--text); }
  .cal-nav{
    width:28px; height:28px; border-radius:8px; background: var(--panel-3);
    border:1px solid var(--hair); display:flex; align-items:center; justify-content:center;
    color:var(--text-dim); font-size:14px;
  }
  .cal-nav:active{ background: var(--panel); }
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal-dow{ text-align:center; font-size:10px; color:var(--text-faint); padding:4px 0 6px; }
  .cal-day{
    text-align:center; font-size:12.5px; padding:7px 0; border-radius:8px;
    color:var(--text-dim); font-family:var(--font-mono);
  }
  .cal-day[data-date]:active{ background: var(--panel-3); }
  .cal-day.other-month{ color:var(--text-faint); opacity:0.35; }
  .cal-day.today{ border:1px solid var(--teal); color:var(--text); }
  .cal-day.selected{ background: var(--teal); color:#04231C; font-weight:700; }
  .cal-foot{ display:flex; justify-content:flex-end; margin-top:6px; }
  .cal-today-btn{ font-size:11.5px; color:var(--teal); font-weight:600; padding:4px 6px; }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <div class="wordmark">Invest<span>OS</span></div>
      <div class="tagline">DAILY CHECK · 掛單即紀律 · v1.3</div>
    </div>
    <div class="icon-btn" id="btnParams" title="參數設定">⚙︎</div>
  </div>

  <div class="hero st-idle" id="hero">
    <div class="eyebrow" id="heroEyebrow">SYSTEM STATUS</div>
    <div class="headline" id="heroHeadline">載入中…</div>
    <div class="sub" id="heroSub">正在讀取資料</div>
  </div>

  <div class="tabs" id="tabsRow"></div>

  <!-- ============ INPUT CARD ============ -->
  <div class="card">
    <div class="card-title"><h3>資料輸入</h3><button class="btn btn-primary btn-sm" id="toggleInput" title="展開"><span class="chev collapsed">▾</span></button></div>
    <div id="inputBody" style="display:none;">

    <!-- 日常操作：每天真正需要輸入的東西，跟自動抓價一起送出 -->
    <div class="field">
      <label style="color:var(--text);">目前現金／股數<span style="color:var(--text-faint); font-weight:400;">（計算現金佔總部位%）</span></label>
    </div>
    <div class="grid2">
      <div class="field">
        <label id="cashLabel">現金</label>
        <input type="number" step="1" id="inCashNow" placeholder="0">
      </div>
      <div class="field">
        <label id="sharesLabel">股數</label>
        <input type="number" step="1" id="inSharesNow" placeholder="0">
      </div>
    </div>

    <div class="field" style="padding-top:12px; border-top:1px solid var(--hair);">
      <label style="color:var(--text);">持股成本／建倉起始日<span style="color:var(--text-faint); font-weight:400;">（計算出清基準與時間停損）</span></label>
    </div>
    <div class="grid2">
      <div class="field">
        <label>平均持股成本</label>
        <input type="number" step="0.01" id="inAvgCostNow" placeholder="0.00">
      </div>
      <div class="field">
        <label>建倉起始日</label>
        <input type="date" id="inPositionStartNow">
      </div>
    </div>

    <div id="marginFieldsWrap" style="display:none;">
      <div class="field" style="padding-top:12px; border-top:1px solid var(--hair);">
        <label style="color:var(--text);">融資部位<span style="color:var(--text-faint); font-weight:400;">（計算融資維持率，僅台股適用）</span></label>
      </div>
      <div class="grid2">
        <div class="field">
          <label>融資買進均價</label>
          <input type="number" step="0.01" id="inMarginCostNow" placeholder="0.00">
        </div>
        <div class="field">
          <label>融資股數</label>
          <input type="number" step="1" id="inMarginSharesNow" placeholder="0">
        </div>
      </div>
    </div>

    <div class="footer-note" style="text-align:left; margin-bottom:10px;">「更新」會同時從證交所更新最近3個交易日的收盤價與均線</div>
    <button class="btn btn-neutral btn-sm" id="btnUpdateDaily" style="width:100%;">更新</button>
    <div class="footer-note" id="updateDailyStatus" style="text-align:left; margin-top:6px;"></div>

    <!-- 進階/例外處理：收合，平常不會用到 -->
    <div class="card-title" style="margin-top:16px; padding-top:14px; border-top:1px solid var(--hair);">
      <h3 style="font-size:13px;">進階</h3>
      <button class="btn btn-primary btn-sm" id="toggleAdvancedInput" title="展開"><span class="chev collapsed">▾</span></button>
    </div>
    <div id="advancedInputBody" style="display:none;">

    <div class="field date-field">
      <label style="color:var(--text);">手動更新特定日期的價格／均線（不更動現金／股數）</label>
      <input type="text" id="inDate" readonly placeholder="YYYY-MM-DD">
      <div class="calendar-pop" id="calendarPop">
        <div class="cal-head">
          <div class="cal-nav" id="calPrev">‹</div>
          <div class="cal-title" id="calTitle"></div>
          <div class="cal-nav" id="calNext">›</div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="cal-foot"><span class="cal-today-btn" id="calToday">今天</span></div>
      </div>
    </div>

    <div class="grid2">
      <div class="field"><label>收盤價</label><input type="number" step="0.01" id="inClose" placeholder="0.00"></div>
      <div class="field"><label>MA5</label><input type="number" step="0.01" id="inMa5" placeholder="0.00"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>MA20</label><input type="number" step="0.01" id="inMa20" placeholder="0.00"></div>
      <div class="field"><label>MA60</label><input type="number" step="0.01" id="inMa60" placeholder="0.00"></div>
    </div>
    <button class="btn btn-neutral btn-sm" id="btnAdd">更新</button>

    <div class="field" style="margin-top:14px; padding-top:12px; border-top:1px solid var(--hair);">
      <label style="color:var(--text);">匯入歷史紀錄檔案</label>
      <input type="file" id="inImportFile" accept=".txt,text/plain" style="display:none;">
      <button type="button" class="btn btn-neutral btn-sm" id="btnImportFile">匯入</button>
      <div class="footer-note" id="importStatus" style="text-align:left; margin-top:6px;"></div>
    </div>

    </div>
    </div>
  </div>

  <!-- ============ HISTORY CARD ============ -->
  <div class="card">
    <div class="card-title"><h3>歷史紀錄</h3><button class="btn btn-primary btn-sm" id="toggleHist" title="展開"><span class="chev collapsed">▾</span></button></div>
    <div id="histBody" style="display:none;">
    <div id="histList"></div>
    <button class="btn btn-neutral btn-sm" id="btnExportHist">匯出</button>
    </div>
  </div>

  <!-- ============ LED PANEL ============ -->
  <div class="card">

<script>
const KEY_PARAMS = 'tsmos:params';
const KEY_ASSETS = 'tsmos:assets';
const KEY_LOG = k => 'tsmos:log:' + k;
const KEY_CASH = k => 'tsmos:cash:' + k;
const KEY_SHARES = k => 'tsmos:shares:' + k;
const KEY_MARGIN_COST = k => 'tsmos:margincost:' + k;
const KEY_MARGIN_SHARES = k => 'tsmos:marginshares:' + k;
const KEY_AVG_COST = k => 'tsmos:avgcost:' + k;
const KEY_POSITION_START = k => 'tsmos:positionstart:' + k;

const DEFAULT_PARAMS = {
  tolerance: 0.005,
  exitMult: 1.08,
  layer2Mult: 0.97,
  cashTargetPct: 0.20,
  marginRatio: 0.60,
  marginCallRatio: 1.20,
  costExitMult: 1.02,
  timeStopDays: 180,
  partialExitFrac: 0.30,
};

const PARAM_META = [
  ['tolerance','MA20區間容忍度(上界)','pct'],
  ['exitMult','出清價位乘數','mult'],
  ['layer2Mult','第二層重砲乘數','mult'],
  ['cashTargetPct','目標現金佔比%（現金／總部位）','pct'],
  ['marginRatio','融資成數%','pct'],
  ['marginCallRatio','融資維持率警戒門檻%','pct'],
  ['costExitMult','出清成本乘數（與MA20出清價取高者）','mult'],
  ['timeStopDays','時間停損天數（超過未出清則分批停損）','int'],
  ['partialExitFrac','分批出清比例%（出清觸發／時間停損共用）','pct'],
];

// 每個投資標的都是獨立設定：計價幣別、定期定額/股模式、剛性參數、價格取整單位
const DEFAULT_ASSETS = [
  { key:'spot', name:'台積電 2330', currency:'元',  priceDecimals:2, roundTick:5, dcaMode:'amount', dcaValue:10000, boostValue:10000, l1:300, l2:400, stockNo:'2330' },
  { key:'adr',  name:'TSM ADR',    currency:'美元', priceDecimals:2, roundTick:0, dcaMode:'shares', dcaValue:1,     boostValue:1,     l1:30,  l2:40,  stockNo:''     },
];

// ---------- 證交所自動抓取（僅台股上市股票） ----------
// 注意：openapi.twse.com.tw / www.twse.com.tw 沒有開放CORS給任意網域，
// 瀏覽器端需透過中介代理伺服器轉發請求。
// 使用自己架設的Cloudflare Worker（穩定、不受第三方免費服務狀況影響）。
const CORS_PROXY = "https://investos-proxy.chuanyinlin.workers.dev/?url=";

// 證交所回傳日期格式為民國年，例如 "115/07/09"，轉換成西元 ISO 格式
function twseDateToISO(twseDate){
  const parts = String(twseDate).split('/');
  if(parts.length !== 3) return null;
  const year = parseInt(parts[0], 10) + 1911;
  const month = parts[1].padStart(2, '0');
  const day = parts[2].padStart(2, '0');
  return `${year}-${month}-${day}`;
}

// 抓單一股票、單一月份的每日收盤價
async function fetchStockMonth(stockNo, yyyymm01){
  const target = `https://www.twse.com.tw/exchangeReport/STOCK_DAY?date=${yyyymm01}&stockNo=${encodeURIComponent(stockNo)}`;
  const res = await fetch(CORS_PROXY + encodeURIComponent(target));
  if(!res.ok) throw new Error(`網路回應異常（狀態碼 ${res.status}）`);
  const json = await res.json();
  if(json.stat !== 'OK' || !Array.isArray(json.data)) return [];
  return json.data.map(row => ({
    date: twseDateToISO(row[0]),
    close: parseFloat(String(row[6]).replace(/,/g, ''))
  })).filter(r => r.date && !isNaN(r.close));
}

// 往回抓 monthsBack 個月的資料，合併、去重、依日期排序，確保MA60有足夠天數
// baseDate：以哪一天為基準往回抓（預設今天），確保能涵蓋使用者在日期選擇器選的那一天
// 改用依序抓取（而非同時平行發出多個請求），避免免費代理伺服器因同時連線過多而失敗
// 抓取指定日期區間（fromDate ~ toDate，含首尾月份）的每日收盤價，逐月依序抓取並停頓，避免代理過載。
// onProgress(doneCount, totalCount) 可選，用於回測時顯示進度。
async function fetchMonthRangeCloses(stockNo, fromDate, toDate, onProgress){
  const months = [];
  let cursor = new Date(fromDate.getFullYear(), fromDate.getMonth(), 1);
  const end = new Date(toDate.getFullYear(), toDate.getMonth(), 1);
  while(cursor <= end){
    months.push(`${cursor.getFullYear()}${String(cursor.getMonth()+1).padStart(2,'0')}01`);
    cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
  }
  const merged = {};
  for(let i = 0; i < months.length; i++){
    let rows = [];
    try{
      rows = await fetchStockMonth(stockNo, months[i]);
    } catch(err){
      console.warn(`抓取 ${months[i]} 失敗，略過該月`, err);
    }
    rows.forEach(r => { merged[r.date] = r.close; });
    if(onProgress) onProgress(i + 1, months.length);
    if(i < months.length - 1){ await new Promise(resolve => setTimeout(resolve, 600)); }
  }
  return Object.keys(merged).sort().map(date => ({ date, close: merged[date] }));
}

async function fetchRecentCloses(stockNo, baseDate, monthsBack = 4){
  const merged = {};
  for(let i = 0; i < monthsBack; i++){
    const d = new Date(baseDate.getFullYear(), baseDate.getMonth() - i, 1);
    const yyyymm01 = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}01`;
    let rows = [];
    try{
      rows = await fetchStockMonth(stockNo, yyyymm01);
    } catch(err){
      console.warn(`抓取 ${yyyymm01} 失敗，略過該月`, err);
    }
    rows.forEach(r => { merged[r.date] = r.close; });
    // 每次請求之間停頓一下，減少對免費代理的瞬間負載
    if(i < monthsBack - 1){ await new Promise(resolve => setTimeout(resolve, 600)); }
  }
  return Object.keys(merged).sort().map(date => ({ date, close: merged[date] }));
}

function calcMA(closes, period){
  if(closes.length < period) return null;
  const slice = closes.slice(-period);
  return slice.reduce((a,b) => a+b, 0) / period;
}

// 核心抓取邏輯：抓最近3個交易日、算MA、寫進歷史紀錄，回傳結果不直接碰UI，
// 讓「只更新價格」跟「現金/股數+價格一起更新」兩個按鈕可以共用
async function fetchLast3DaysCore(){
  const key = state.activeTab;
  const asset = getAsset(key);
  if(!asset.stockNo){
    return { ok:false, msg:'此標的無自動更新收盤價與均線功能，請至「進階」手動輸入。' };
  }
  try{
    const today = new Date();
    const allRows = await fetchRecentCloses(asset.stockNo, today, 4);
    if(allRows.length < 8){ throw new Error('回傳資料不足，可能是股票代號錯誤或近期無交易資料'); }
    // 取最近3個交易日，每一天的MA都只用「截至該日（含）」的資料計算，避免用到未來資料
    const last3 = allRows.slice(-3);
    const closes = allRows.map(r => r.close);
    last3.forEach(target => {
      const idx = allRows.findIndex(r => r.date === target.date);
      const closesUpTo = closes.slice(0, idx + 1);
      const ma5 = calcMA(closesUpTo, 5);
      const ma20 = calcMA(closesUpTo, 20);
      const ma60 = calcMA(closesUpTo, 60);
      const existingIdx = state.log[key].findIndex(r => r.date === target.date);
      const entry = {
        date: target.date,
        close: target.close,
        ma5, ma20, ma60,
        cash: existingIdx >= 0 ? state.log[key][existingIdx].cash : null,
      };
      if(existingIdx >= 0){
        state.log[key][existingIdx] = entry;
      } else {
        state.log[key].push(entry);
      }
    });
    // 只保留最近3天的紀錄，跟手動新增走同一套規則
    state.log[key] = sortedLog(key).slice(-3);
    await storageSet(KEY_LOG(key), state.log[key]);
    const dateList = last3.map(r => r.date).join('、');
    return { ok:true, msg:`已寫入歷史紀錄：${dateList}` };
  } catch(err){
    console.error('fetch last 3 days failed', err);
    return { ok:false, msg:`本次未更新到最新資料（${err.message}），現有判定仍基於先前的歷史紀錄` };
  }
}

async function runBacktest(){
  const key = state.activeTab;
  const asset = getAsset(key);
  const statusEl = document.getElementById('backtestStatus');
  const resultEl = document.getElementById('backtestResult');
  const btn = document.getElementById('btnRunBacktest');
  resultEl.innerHTML = '';

  if(!asset.stockNo){
    statusEl.innerHTML = `<span style="color:var(--red)">此標的無自動更新功能，無法回測（僅支援有設定股票代號的台股標的）。</span>`;
    return;
  }
  const startStr = document.getElementById('btStartDate').value;
  if(!startStr){
    statusEl.innerHTML = `<span style="color:var(--red)">請選擇開始定期定額日期。</span>`;
    return;
  }
  const startDate = new Date(startStr + 'T00:00:00');
  const today = new Date();
  if(isNaN(startDate.getTime())){
    statusEl.innerHTML = `<span style="color:var(--red)">日期格式錯誤。</span>`;
    return;
  }
  if(startDate > today){
    statusEl.innerHTML = `<span style="color:var(--red)">開始日期不能晚於今天。</span>`;
    return;
  }

  // 往前抓約4個月做為MA60計算的緩衝，往後抓到「開始日+1年」或「今天」（取較早者），限制模擬跨度在1年內
  const fetchFrom = new Date(startDate.getFullYear(), startDate.getMonth() - 4, 1);
  const oneYearLater = new Date(startDate.getFullYear() + 1, startDate.getMonth(), startDate.getDate());
  const fetchTo = oneYearLater < today ? oneYearLater : today;
  const oneYearLimitStr = oneYearLater.toISOString().slice(0,10);

  const originalText = btn.textContent;
  btn.disabled = true;
  statusEl.innerHTML = `<span style="color:var(--text-dim)">抓取歷史資料中...</span>`;

  try{
    const allRows = await fetchMonthRangeCloses(asset.stockNo, fetchFrom, fetchTo, (done, total) => {
      btn.textContent = `抓取中 ${done}/${total}`;
      statusEl.innerHTML = `<span style="color:var(--text-dim)">抓取歷史資料中...（${done}/${total}個月）</span>`;
    });
    if(allRows.length < 10){
      throw new Error('回傳資料不足，可能是股票代號錯誤或該區間無交易資料');
    }

    const startStr2 = startDate.toISOString().slice(0,10);
    const startIdx = allRows.findIndex(r => r.date >= startStr2);
    if(startIdx === -1){
      throw new Error('開始日期之後查無交易資料');
    }
    const actualStartStr = allRows[startIdx].date;
    const dateNote = (actualStartStr !== startStr2) ? `（${startStr2}非交易日，已改用最近交易日 ${actualStartStr} 起算）` : '';

    statusEl.innerHTML = `<span style="color:var(--text-dim)">模擬計算中...</span>`;
    btn.textContent = originalText;

    const closes = allRows.map(r => r.close);
    const P = state.params;
    const tickDec = asset.roundTick ? 0 : asset.priceDecimals;
    const maAt = (idx, period) => {
      if(idx + 1 < period) return null;
      const slice = closes.slice(idx + 1 - period, idx + 1);
      return slice.reduce((a,b)=>a+b, 0) / period;
    };

    let totalShares = 0, totalCost = 0;
    let dcaCount = 0, momentumCount = 0, bombardCount = 0;
    let exitInfo = null;
    let lastSimIdx = startIdx;
    const recentDays = []; // 保留最近幾天的均線快照，供人工核對觸發是否合理

    for(let i = startIdx; i < allRows.length; i++){
      const dateStr = allRows[i].date;
      if(dateStr > oneYearLimitStr) break;
      lastSimIdx = i;

      const close = closes[i];
      const ma5 = maAt(i, 5), ma20 = maAt(i, 20), ma60 = maAt(i, 60);
      const ma5p = i>0 ? maAt(i-1, 5) : null;
      const ma20p = i>0 ? maAt(i-1, 20) : null;
      const ma60p = i>0 ? maAt(i-1, 60) : null;
      if(ma5 == null || ma20 == null) continue;

      const touch = close <= ma20 * (1 + P.tolerance);
      const ma20upFlat = (ma20p != null) ? (ma20 >= ma20p) : false;
      const priceAboveMa60 = (ma60 != null) ? (close >= ma60) : false;
      const hasMa60 = (ma60 != null && ma60p != null);
      const ma60upFlat = hasMa60 ? (ma60 >= ma60p) : false;
      const priceDefenseOk = hasMa60 ? (ma60upFlat && priceAboveMa60) : false;
      const defenseOk = priceDefenseOk; // 純技術面回測，不考慮現金／融資限制
      const bombard = touch && ma20upFlat && defenseOk;

      const ma5upFlat = (ma5p != null) ? (ma5 >= ma5p) : false;
      let threeDay = false;
      if(i >= 2){
        const m1 = maAt(i-1, 5), m2 = maAt(i-2, 5);
        threeDay = (m1 != null && m2 != null) && close > ma5 && closes[i-1] > m1 && closes[i-2] > m2;
      }
      const momentum = threeDay && ma5upFlat && defenseOk;
      const exit = close >= ma20 * P.exitMult;

      recentDays.push({ date: dateStr, close, ma5, ma20, ma60, touch, bombard, momentum, exit, defenseOk });
      if(recentDays.length > 5) recentDays.shift();

      // 定期定額／定股：每個交易日固定執行
      if(asset.dcaMode === 'amount'){ totalShares += asset.dcaValue / close; totalCost += asset.dcaValue; }
      else { totalShares += asset.dcaValue; totalCost += asset.dcaValue * close; }
      dcaCount++;

      // 動能觸發
      if(momentum){
        if(asset.dcaMode === 'amount'){ totalShares += asset.boostValue / close; totalCost += asset.boostValue; }
        else { totalShares += asset.boostValue; totalCost += asset.boostValue * close; }
        momentumCount++;
      }

      // 重砲觸發：第一層＋第二層，恆以股數計
      if(bombard){
        const basePrice = Math.min(close, ma20);
        const p1 = applyTick(basePrice, asset.roundTick, 'ceil');
        const p2 = applyTick(basePrice * P.layer2Mult, asset.roundTick, 'ceil');
        totalShares += asset.l1; totalCost += asset.l1 * p1;
        totalShares += asset.l2; totalCost += asset.l2 * p2;
        bombardCount++;
      }

      // 出清觸發：全部賣出，模擬結束
      if(exit && totalShares > 0){
        const exitPrice = applyTick(ma20 * P.exitMult, asset.roundTick, 'round');
        const proceeds = totalShares * exitPrice;
        const profit = proceeds - totalCost;
        const profitPct = totalCost > 0 ? (profit / totalCost * 100) : 0;
        const holdDays = Math.round((new Date(dateStr) - new Date(actualStartStr)) / 86400000);
        exitInfo = { exitDate: dateStr, exitPrice, totalShares, totalCost, proceeds, profit, profitPct, holdDays };
        break;
      }
    }

    const unit = asset.currency;
    let html = `<div class="footer-note" style="text-align:left; margin-top:10px;">起算日：${actualStartStr}${dateNote}</div>`;
    html += `<div class="footer-note" style="text-align:left;">模擬執行：定期定額/股 ${dcaCount}次｜動能觸發 ${momentumCount}次｜重砲觸發 ${bombardCount}次</div>`;
    if(exitInfo){
      html += `<div class="footer-note" style="text-align:left; margin-top:6px; color:var(--teal); font-weight:700;">✅ ${exitInfo.exitDate} 觸發出清（持有 ${exitInfo.holdDays} 天）</div>`;
      html += `<div class="footer-note" style="text-align:left;">累積股數：${fmtRaw(exitInfo.totalShares,0)} 股｜總投入成本：${fmtRaw(exitInfo.totalCost,0)} ${unit}</div>`;
      html += `<div class="footer-note" style="text-align:left;">出清價：${fmtRaw(exitInfo.exitPrice,tickDec)}｜出清金額：${fmtRaw(exitInfo.proceeds,0)} ${unit}</div>`;
      const profitColor = exitInfo.profit >= 0 ? 'var(--teal)' : 'var(--red)';
      html += `<div class="footer-note" style="text-align:left; color:${profitColor}; font-weight:700;">損益：${exitInfo.profit>=0?'+':''}${fmtRaw(exitInfo.profit,0)} ${unit}（${exitInfo.profit>=0?'+':''}${exitInfo.profitPct.toFixed(2)}%）</div>`;
    } else {
      const lastDate = allRows[lastSimIdx].date;
      const lastClose = closes[lastSimIdx];
      const markValue = totalShares * lastClose;
      const unrealized = markValue - totalCost;
      const unrealizedPct = totalCost > 0 ? (unrealized/totalCost*100) : 0;
      const holdDays = Math.round((new Date(lastDate) - new Date(actualStartStr)) / 86400000);
      html += `<div class="footer-note" style="text-align:left; margin-top:6px; color:var(--amber);">・回測期間內（至 ${lastDate}，已持有 ${holdDays} 天）尚未觸發出清</div>`;
      html += `<div class="footer-note" style="text-align:left;">累積股數：${fmtRaw(totalShares,0)} 股｜總投入成本：${fmtRaw(totalCost,0)} ${unit}</div>`;
      html += `<div class="footer-note" style="text-align:left;">${lastDate}收盤市值：${fmtRaw(markValue,0)} ${unit}（未實現）</div>`;
      const upColor = unrealized >= 0 ? 'var(--teal)' : 'var(--red)';
      html += `<div class="footer-note" style="text-align:left; color:${upColor}; font-weight:700;">未實現損益：${unrealized>=0?'+':''}${fmtRaw(unrealized,0)} ${unit}（${unrealized>=0?'+':''}${unrealizedPct.toFixed(2)}%）</div>`;
    }
    html += `<div class="footer-note" style="text-align:left; margin-top:8px; color:var(--text-faint); font-size:10.5px;">※純技術面模擬，未考慮現金／融資防禦邊界限制，僅供策略參考</div>`;

    // 附上最近幾天的均線快照，方便人工核對觸發是否合理
    if(recentDays.length > 0){
      html += `<div class="footer-note" style="text-align:left; margin-top:10px; color:var(--text);">最近 ${recentDays.length} 天均線數值（供核對）：</div>`;
      recentDays.forEach(d=>{
        const ma60Txt = d.ma60 != null ? fmtRaw(d.ma60,2) : '—';
        const tags = [];
        if(d.bombard) tags.push('重砲');
        if(d.momentum) tags.push('動能');
        if(d.exit) tags.push('出清');
        const tagTxt = tags.length ? `［${tags.join('／')}］` : '';
        html += `<div class="footer-note" style="text-align:left;">${d.date}：收盤${fmtRaw(d.close,2)}｜MA5 ${fmtRaw(d.ma5,2)}｜MA20 ${fmtRaw(d.ma20,2)}｜MA60 ${ma60Txt} ${tagTxt}</div>`;
      });
    }

    resultEl.innerHTML = html;
    statusEl.innerHTML = `<span style="color:var(--teal)">✅ 回測完成</span>`;
  } catch(err){
    console.error('backtest failed', err);
    statusEl.innerHTML = `<span style="color:var(--red)">回測失敗：${err.message}</span>`;
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

// 匯出歷史資料（不執行模擬）：從開始日期往前抓約4個月做MA緩衝，一路抓到今天，
// 輸出成跟「歷史紀錄」匯出一樣的.txt格式，方便直接提供給Claude做外部分析
async function exportBacktestHistory(){
  const key = state.activeTab;
  const asset = getAsset(key);
  const statusEl = document.getElementById('btExportStatus');
  const btn = document.getElementById('btnExportBtData');

  if(!asset.stockNo){
    statusEl.innerHTML = `<span style="color:var(--red)">此標的無自動更新功能，無法匯出（僅支援有設定股票代號的台股標的）。</span>`;
    return;
  }
  const startStr = document.getElementById('btStartDate').value;
  if(!startStr){
    statusEl.innerHTML = `<span style="color:var(--red)">請選擇開始日期。</span>`;
    return;
  }
  const startDate = new Date(startStr + 'T00:00:00');
  const today = new Date();
  if(isNaN(startDate.getTime())){
    statusEl.innerHTML = `<span style="color:var(--red)">日期格式錯誤。</span>`;
    return;
  }
  if(startDate > today){
    statusEl.innerHTML = `<span style="color:var(--red)">開始日期不能晚於今天。</span>`;
    return;
  }

  const fetchFrom = new Date(startDate.getFullYear(), startDate.getMonth() - 4, 1);
  const originalText = btn.textContent;
  btn.disabled = true;
  statusEl.innerHTML = `<span style="color:var(--text-dim)">抓取歷史資料中...</span>`;

  try{
    const allRows = await fetchMonthRangeCloses(asset.stockNo, fetchFrom, today, (done, total) => {
      btn.textContent = `抓取中 ${done}/${total}`;
      statusEl.innerHTML = `<span style="color:var(--text-dim)">抓取歷史資料中...（${done}/${total}個月）</span>`;
    });
    if(allRows.length < 10){
      throw new Error('回傳資料不足，可能是股票代號錯誤或該區間無交易資料');
    }

    const startStr2 = startDate.toISOString().slice(0,10);
    const startIdx = allRows.findIndex(r => r.date >= startStr2);
    if(startIdx === -1){
      throw new Error('開始日期之後查無交易資料');
    }

    const closes = allRows.map(r => r.close);
    const maAt = (idx, period) => {
      if(idx + 1 < period) return null;
      const slice = closes.slice(idx + 1 - period, idx + 1);
      return slice.reduce((a,b)=>a+b, 0) / period;
    };

    let txt = `${asset.name}\n`;
    txt += '日期        收盤價        MA5           MA20          MA60\n';
    for(let i = startIdx; i < allRows.length; i++){
      const ma5 = maAt(i,5), ma20 = maAt(i,20), ma60 = maAt(i,60);
      const ma60Txt = ma60 != null ? fmtRaw(ma60,2) : '—';
      const ma20Txt = ma20 != null ? fmtRaw(ma20,2) : '—';
      const ma5Txt = ma5 != null ? fmtRaw(ma5,2) : '—';
      txt += `${allRows[i].date}   ${fmtRaw(closes[i],2).padStart(10)}   ${String(ma5Txt).padStart(10)}   ${String(ma20Txt).padStart(10)}   ${String(ma60Txt).padStart(10)}\n`;
    }

    const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${asset.name}_回測資料_${allRows[startIdx].date}~${allRows[allRows.length-1].date}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    statusEl.innerHTML = `<span style="color:var(--teal)">✅ 已匯出 ${allRows[startIdx].date} ~ ${allRows[allRows.length-1].date}，共 ${allRows.length - startIdx} 筆資料</span>`;
  } catch(err){
    console.error('export backtest history failed', err);
    statusEl.innerHTML = `<span style="color:var(--red)">匯出失敗：${err.message}</span>`;
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

let state = {
  params: {...DEFAULT_PARAMS},
  assets: DEFAULT_ASSETS.map(a=>({...a})),
  log: {},
  cash: {},
  shares: {},
  marginCost: {},
  marginShares: {},
  avgCost: {},
  positionStart: {},
  activeTab: 'spot',
  histCollapsed: true,
  inputCollapsed: true,
  advancedInputCollapsed: true,
  ledCollapsed: true,
  reserveCollapsed: true,
  ordersCollapsed: true,
  backtestCollapsed: true,
};

function getAsset(key){
  return state.assets.find(a=>a.key===key) || state.assets[0];
}

async function storageGet(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    if(raw !== null) return JSON.parse(raw);
    return fallback;
  }catch(e){ return fallback; }
}
async function storageSet(key, value){
  try{ localStorage.setItem(key, JSON.stringify(value)); }
  catch(e){ console.error('storage set failed', e); }
}

function fmt(n, d=1){
  if(n === undefined || n === null || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d});
}

// 不含千分位逗號的純數字格式化，專供匯出檔案與委託清單使用，避免逗號破壞匯入時的parseFloat解析
function fmtRaw(n, d=2){
  if(n === undefined || n === null || isNaN(n)) return '—';
  return Number(n).toFixed(d);
}

// 依標的的價格取整單位（roundTick）調整價格；tick=0代表不取整
function applyTick(n, tick, mode){
  if(n === undefined || n === null || isNaN(n)) return null;
  if(!tick) return n;
  return mode === 'ceil' ? Math.ceil(n / tick) * tick : Math.round(n / tick) * tick;
}

function sortedLog(assetKey){
  const rows = state.log[assetKey] || [];
  return [...rows].sort((a,b)=> a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
}

// 計算應保留金額，直接讀取歷史紀錄原始資料，不呼叫computeForAsset，避免與防禦邊界判定互相循環呼叫
// 現金應保留金額 = 目標現金佔比% 換算出的等值金額，
// 公式推導：cash / (cash + 市值) >= targetPct  =>  cash >= targetPct * 市值 / (1 - targetPct)
// 市值 = 目前股數 × 今日收盤價，因此需要股數與今日收盤價才能計算
function getRequiredReserve(assetKey){
  const P = state.params;
  const rows = sortedLog(assetKey);
  if(rows.length === 0) return null;
  const today = rows[rows.length-1];
  if(today.close == null) return null;
  const shares = state.shares[assetKey] || 0;
  const marketValue = shares * today.close;
  const pct = P.cashTargetPct;
  if(pct <= 0) return 0;
  if(pct >= 1) return null; // 參數不合理（100%以上），無法換算等值金額
  return Math.round(pct * marketValue / (1 - pct));
}

// 融資防禦邊界：利用融資成數固定的特性簡化計算，維持率與融資股數無關（分子分母同乘股數會抵消）
// 維持率% = 目前股價 ÷ (融資買進均價 × 融資成數) × 100%
// 融資追繳價 = 融資買進均價 × 融資成數 × 維持率警戒門檻
function getMarginStatus(assetKey){
  const P = state.params;
  const asset = getAsset(assetKey);
  if(!asset.stockNo) return null; // 無股票代號（如ADR）視為無融資功能，不適用
  const costPrice = state.marginCost[assetKey] || 0;
  if(costPrice <= 0) return { applicable:true, hasPrice:false }; // 尚未輸入融資買進均價，視為目前無融資部位
  const rows = sortedLog(assetKey);
  if(rows.length === 0) return { applicable:true, hasPrice:false };
  const today = rows[rows.length-1];
  if(today.close == null) return { applicable:true, hasPrice:false };
  const marginAmount = costPrice * P.marginRatio; // 融資金額（每股基準）
  const maintenanceRatio = marginAmount > 0 ? (today.close / marginAmount) : null;
  const callPrice = marginAmount * P.marginCallRatio;
  const safe = maintenanceRatio != null ? (today.close > callPrice) : null;
  return {
    applicable: true, hasPrice: true,
    costPrice, marginAmount, maintenanceRatio, callPrice, safe,
    shares: state.marginShares[assetKey] || 0,
  };
}

function computeForAsset(assetKey){
  const rows = sortedLog(assetKey);
  const n = rows.length;
  const P = state.params;
  const out = { ready: n>=3, ready1:n>=1, ready2:n>=2 };
  if(n < 1) return out;
  const today = rows[n-1];
  out.today = today;

  // 下面這些判定只需要「今天」的資料就能算，資料只有1筆也能判定
  out.touch = today.close <= today.ma20 * (1 + P.tolerance);
  // 出清價位：MA20×出清乘數 與 平均持股成本×成本乘數，兩者取高者；沒有輸入持股成本時退回原本純技術面基準
  const avgCost = state.avgCost[assetKey] || 0;
  const ma20ExitPrice = today.ma20 * P.exitMult;
  const costExitPrice = avgCost > 0 ? avgCost * P.costExitMult : null;
  out.exitThreshold = (costExitPrice != null) ? Math.max(ma20ExitPrice, costExitPrice) : ma20ExitPrice;
  out.exitThresholdSource = (costExitPrice != null && costExitPrice > ma20ExitPrice) ? 'cost' : 'ma20';
  out.exit = today.close >= out.exitThreshold; // 出清不受防禦邊界影響

  // 時間停損：從建倉起始日算起，超過設定天數仍未出清，建議分批停損
  const posStart = state.positionStart[assetKey];
  if(posStart && (state.shares[assetKey]||0) > 0){
    const startD = new Date(posStart + 'T00:00:00');
    const todayD = new Date(today.date + 'T00:00:00');
    if(!isNaN(startD.getTime())){
      out.holdDays = Math.round((todayD - startD) / 86400000);
      out.timeStopTriggered = out.holdDays >= P.timeStopDays;
    }
  }

  const requiredReserve = getRequiredReserve(assetKey);
  const cur = state.cash[assetKey] || 0;
  out.requiredReserve = requiredReserve;
  out.cashSufficient = (requiredReserve == null) ? null : (cur >= requiredReserve);

  // 融資防禦邊界：只在有股票代號（台股）且有輸入融資買進均價時才適用，ADR等無融資功能標的視為不適用（不影響defenseOk）
  out.marginStatus = getMarginStatus(assetKey);

  // 股價站穩MA60只需要今天的MA60就能比較，不用等到有前一天的MA60資料
  out.hasMa60Today = today.ma60 != null;
  if(out.hasMa60Today){
    out.priceAboveMa60 = today.close >= today.ma60;
  }

  if(n < 2){ return out; }
  const t1 = rows[n-2];
  out.t1 = t1;
  out.ma5up = today.ma5 > t1.ma5;
  out.ma5upFlat = today.ma5 >= t1.ma5;
  out.ma20upFlat = today.ma20 >= t1.ma20;

  // 防禦邊界（MA60）：MA60持平或向上，且股價站穩MA60，全系統正常運作；
  // 否則暫停加倍與重砲，僅維持常態扣款。缺少MA60資料時保守視為防禦邊界未確認。
  out.hasMa60 = out.hasMa60Today && (t1.ma60 != null);
  if(out.hasMa60){
    out.ma60upFlat = today.ma60 >= t1.ma60;
    out.priceDefenseOk = out.ma60upFlat && out.priceAboveMa60;
  } else {
    out.priceDefenseOk = false;
  }

  // 現金應保留金額是否足夠，也併入防禦邊界的最終判定：現金不足時，防禦邊界視同關閉，
  // 動能觸發與重砲觸發都會被暫停執行。融資維持率跌破門檻時，同樣視為防禦邊界關閉。
  out.marginSafe = (out.marginStatus && out.marginStatus.hasPrice) ? out.marginStatus.safe : true;
  out.defenseOk = out.priceDefenseOk && (out.cashSufficient === true) && out.marginSafe;
  out.bombard = out.touch && out.ma20upFlat && out.defenseOk;

  if(n >= 3){
    const t2 = rows[n-3];
    out.t2 = t2;
    out.threeDay = today.close > today.ma5 && t1.close > t1.ma5 && t2.close > t2.ma5;
    out.momentum = out.threeDay && out.ma5upFlat && out.defenseOk;
  }
  return out;
}

function renderHero(){
  const key = state.activeTab;
  const asset = getAsset(key);
  const P = state.params;
  const d = computeForAsset(key);
  const hero = document.getElementById('hero');
  const eyebrow = document.getElementById('heroEyebrow');
  const headline = document.getElementById('heroHeadline');
  const sub = document.getElementById('heroSub');
  eyebrow.textContent = asset.name;
  const touchMult = (1+P.tolerance).toFixed(4).replace(/0+$/,'').replace(/\.$/,'');
  const dcaLabel = asset.dcaMode === 'amount' ? '定期定額' : '定期定股';

  if(!d.ready1){
    hero.className = 'hero st-idle';
    headline.textContent = '⏳ 尚無資料';
    sub.textContent = '請先在下方輸入最近三日的資料';
    return;
  }
  const defenseOff = d.ready2 && !d.defenseOk;

  if(d.exit){
    if((state.shares[key]||0) <= 0){
      hero.className = 'hero st-warn';
      headline.textContent = '⚠ 出清觸發，但目前股數為0';
      sub.textContent = `目前股數池為0，沒有部位可以出清`;
    } else {
      hero.className = 'hero st-exit';
      headline.textContent = '💰 出清觸發';
      const srcTxt = d.exitThresholdSource === 'cost' ? '成本乘數' : 'MA20×出清乘數';
      sub.textContent = `股價達出清價位（依${srcTxt}計算：${fmt(d.exitThreshold,2)}），分批出清${(P.partialExitFrac*100).toFixed(0)}%，不受防禦邊界影響`;
    }
  } else if(defenseOff){
    hero.className = 'hero st-defense';
    if(d.marginSafe === false){
      headline.textContent = '🛡 防禦邊界關閉：融資維持率過低';
      sub.textContent = `暫停動能觸發與重砲觸發，僅維持${dcaLabel}，建議減碼融資部位`;
    } else {
      headline.textContent = '🛡 防禦邊界關閉';
      sub.textContent = `暫停動能觸發與重砲觸發，僅維持${dcaLabel}`;
    }
  } else if(d.bombard){
    const cashStatus = getCashStatus(key);
    if(cashStatus.sufficient === true && cashStatus.bombardSufficient === false){
      hero.className = 'hero st-warn';
      headline.textContent = '💥 重砲觸發：現金不足支付重砲';
      sub.textContent = `股價小於MA20×${touchMult}，但現金不足支付第一層重砲`;
    } else if(cashStatus.sufficient === true && cashStatus.bombardSufficientBoth === false){
      hero.className = 'hero st-warn';
      headline.textContent = '💥 重砲觸發：現金不足支付重砲第二層';
      sub.textContent = `股價小於MA20×${touchMult}，但現金不足支付第二層重砲`;
    } else {
      hero.className = 'hero st-bombard';
      headline.textContent = '💥 重砲觸發';
      sub.textContent = `股價小於MA20×${touchMult} 且MA20持平或向上`;
    }
  } else if(d.momentum){
    hero.className = 'hero st-momentum';
    headline.textContent = '🔷 動能觸發';
    sub.textContent = 'MA5持平或向上 且連續三日股價大於MA5';
  } else {
    hero.className = 'hero st-idle';
    headline.textContent = `🟢 ${dcaLabel}`;
    sub.textContent = `僅維持${dcaLabel}，無戰術訊號`;
  }
}

function ledItem(on, label, cls=''){
  return `<div class="led ${on?'on':''} ${cls}">

    <div class="label">${label}</div>
  </div>`;
}

function renderLeds(){
  const key = state.activeTab;
  const P = state.params;
  const d = computeForAsset(key);
  const grid = document.getElementById('ledGrid');
  const n = (state.log[key]||[]).length;
  if(!d.ready1){
    grid.innerHTML = `<div class="empty-hint" style="grid-column:1/-1;">尚無資料，請先在上方輸入今天的資料。</div>`;
    return;
  }
  let noticeHtml = '';
  if(d.ready2 && !d.hasMa60){
    noticeHtml = `<div class="empty-hint" style="grid-column:1/-1;">尚未輸入MA60資料，防禦邊界暫以「未確認」處理，動能觸發與重砲觸發將暫停。</div>`;
  }
  const need = (minN, label) => ledItem(false, `${label}（需${minN}筆，目前${n}筆）`, '');

  let condHtml = '';   // 左欄：判定的條件
  let resultHtml = ''; // 右欄：判定的結果

  // ---- 條件 ----
  { const mled = getMa60UpLedState(d); condHtml += ledItem(mled.on, mled.label, mled.color==='var(--red)'?'red':''); }
  { const pled = getPriceMa60LedState(d); condHtml += ledItem(pled.on, pled.label, pled.color==='var(--red)'?'red':''); }

  const cashStatus = getCashStatus(key);
  const cashLed = getCashLedState(cashStatus);
  const cashLedOn = cashLed.color !== 'var(--text-faint)';
  const cashLedCls = cashLed.color === 'var(--red)' ? 'red' : cashLed.color === 'var(--amber)' ? 'amber' : '';
  condHtml += ledItem(cashLedOn, cashLed.label, cashLedCls);

  const marginLed = getMarginLedState(d);
  const marginLedOn = marginLed.color !== 'var(--text-faint)';
  const marginLedCls = marginLed.color === 'var(--red)' ? 'red' : '';
  condHtml += ledItem(marginLedOn, marginLed.label, marginLedCls);

  condHtml += d.ready2 ? ledItem(d.ma5upFlat, 'MA5持平或向上') : need(2, 'MA5持平或向上');
  condHtml += d.ready2 ? ledItem(d.ma20upFlat, 'MA20持平或向上') : need(2, 'MA20持平或向上');
  condHtml += d.ready ? ledItem(d.threeDay, '連續三日股價大於MA5') : need(3, '連續三日股價大於MA5');
  condHtml += ledItem(d.touch, `股價小於MA20×${(1+P.tolerance).toFixed(4).replace(/0+$/,'').replace(/\.$/,'')}`);
  condHtml += ledItem(d.exit, `股價達出清價位（${fmt(d.exitThreshold,2)}）`);

  // ---- 結果 ----
  { const dled = getDefenseLedState(d); resultHtml += ledItem(dled.on, dled.label, dled.color==='var(--red)'?'red':''); }
  resultHtml += d.ready ? ledItem(d.momentum, '動能觸發') : need(3, '動能觸發');
  resultHtml += d.ready2 ? ledItem(d.bombard, '重砲觸發') : need(2, '重砲觸發');
  if(d.exit && (state.shares[key]||0) <= 0){
    resultHtml += ledItem(true, '出清觸發，但目前股數為0', 'amber');
  } else {
    resultHtml += ledItem(d.exit, `出清觸發，分批${(P.partialExitFrac*100).toFixed(0)}%`, d.exit?'red':'');
  }

  let tsLabel;
  if(d.timeStopTriggered === undefined){
    tsLabel = '時間停損（尚未設定建倉起始日）';
  } else if(d.timeStopTriggered){
    tsLabel = `⚠ 時間停損觸發（已持有${d.holdDays}天），建議分批出清${(P.partialExitFrac*100).toFixed(0)}%`;
  } else {
    tsLabel = `時間停損未觸發（已持有${d.holdDays}天／門檻${P.timeStopDays}天）`;
  }
  resultHtml += ledItem(!!d.timeStopTriggered, tsLabel, d.timeStopTriggered?'amber':'');

  grid.innerHTML = noticeHtml +
    `<div class="led-col"><div class="led-col-title">條件</div>${condHtml}</div>` +
    `<div class="led-col"><div class="led-col-title">結果</div>${resultHtml}</div>`;
}

function orderRow(active, name, cond, detail){

    <div style="flex:1">
      <div class="name">${name}</div>
      <div class="cond">${cond}</div>
      <div class="detail">${detail || '—'}</div>
    </div>
  </div>`;
}

function renderOrders(){
  const P = state.params;
  const key = state.activeTab;
  const asset = getAsset(key);
  const d = computeForAsset(key);
  const list = document.getElementById('orderList');
  let html = '';

  // 定期定額/股：金額模式恆常以市價執行；股數模式顯示前一日收盤價
  let dcaDetail;
  if(asset.dcaMode === 'amount'){
    dcaDetail = `${asset.dcaValue.toLocaleString()} ${asset.currency} ＠市價`;
  } else {
    dcaDetail = d.ready1 ? `${asset.dcaValue} 股 ＠${fmtRaw(d.today.close, asset.priceDecimals)}` : `${asset.dcaValue} 股 ＠市價`;
  }
  const dcaLabel = asset.dcaMode === 'amount' ? '定期定額' : '定期定股';
  html += orderRow(true, dcaLabel, '恆常執行，不受防禦邊界影響', dcaDetail);

  // 動能觸發
  let boostDetail = '';
  if(d.ready){
    boostDetail = asset.dcaMode === 'amount'
      ? `${asset.boostValue.toLocaleString()} ${asset.currency} ＠市價`
      : `${asset.boostValue} 股 ＠${fmtRaw(d.today.close, asset.priceDecimals)}`;
  }
  html += orderRow(!!d.momentum, '動能觸發', 'MA5持平或向上 且連續三日股價大於MA5 且防禦邊界安全', boostDetail);

  // 重砲觸發：第一層 / 第二層（只需要2筆資料即可試算）
  const tickDec = asset.roundTick ? 0 : asset.priceDecimals;
  let l1Detail = '', l2Detail = '';
  if(d.ready2){
    const basePrice = Math.min(d.today.close, d.today.ma20);
    const p1 = applyTick(basePrice, asset.roundTick, 'ceil');
    const p2 = applyTick(basePrice * P.layer2Mult, asset.roundTick, 'ceil');
    l1Detail = `${asset.l1} 股 ＠${fmtRaw(p1, tickDec)}`;
    l2Detail = `${asset.l2} 股 ＠${fmtRaw(p2, tickDec)}`;
  }
  html += orderRow(!!d.bombard, '重砲觸發：第一層', '股價小於MA20區間 且持平或向上 且防禦邊界安全', l1Detail);
  html += orderRow(!!d.bombard, '重砲觸發：第二層', '股價小於MA20區間 且持平或向上 且防禦邊界安全', l2Detail);

  // 出清：分批出清（每次依分批出清比例%執行，非全部出清）
  let exitDetail = '';
  if(d.ready1){
    const exitPrice = applyTick(d.exitThreshold, asset.roundTick, 'round');
    const exitShares = Math.round((state.shares[key]||0) * P.partialExitFrac);
    exitDetail = `${fmtRaw(exitShares,0)} 股 ＠${fmtRaw(exitPrice, tickDec)}（分批${(P.partialExitFrac*100).toFixed(0)}%）`;
  }
  const exitCondTxt = (d.exitThresholdSource === 'cost')
    ? `股價達（MA20×出清乘數 與 持股成本×成本乘數）取高者，分批出清${(P.partialExitFrac*100).toFixed(0)}%，不受防禦邊界影響`
    : `股價大於MA20×出清乘數，分批出清${(P.partialExitFrac*100).toFixed(0)}%，不受防禦邊界影響`;
  html += orderRow(!!d.exit, '出清觸發', exitCondTxt, exitDetail);

  // 時間停損：建倉起始日起算超過設定天數仍未出清，建議分批出場
  const tsShares = Math.round((state.shares[key]||0) * P.partialExitFrac);
  let tsCondTxt, tsDetail;
  if(d.timeStopTriggered === undefined){
    tsCondTxt = `持有超過${P.timeStopDays}天仍未出清，建議分批停損（尚未設定建倉起始日，無法計算）`;
    tsDetail = '';
  } else {
    tsCondTxt = `持有超過${P.timeStopDays}天仍未出清，建議分批停損（已持有${d.holdDays}天）`;
    tsDetail = d.timeStopTriggered ? `${fmtRaw(tsShares,0)} 股 ＠市價（分批${(P.partialExitFrac*100).toFixed(0)}%）` : '';
  }
  html += orderRow(!!d.timeStopTriggered, '時間停損', tsCondTxt, tsDetail);

  list.innerHTML = html;
}

function getCashStatus(key){
  const P = state.params;
  const asset = getAsset(key);
  const d = computeForAsset(key);
  const requiredReserve = getRequiredReserve(key);
  const shares = state.shares[key] || 0;
  const marketValue = (d.today && d.today.close != null) ? shares * d.today.close : null;
  const pctTxt = (P.cashTargetPct*100).toFixed(0);
  let requiredTxt = '';
  if(requiredReserve != null && marketValue != null){
    requiredTxt = `目標現金佔比 ${pctTxt}% × 股票市值(${marketValue.toLocaleString(undefined,{maximumFractionDigits:0})}) → 應保留 ${requiredReserve.toLocaleString()} ${asset.currency}`;
  } else {
    requiredTxt = `目標現金佔比 ${pctTxt}% —（尚無收盤價或股數資料）`;
  }
  const cur = state.cash[key] || 0;
  const unit = asset.currency;
  const sufficient = (requiredReserve == null) ? null : (cur >= requiredReserve);

  // 重砲觸發時，額外試算重砲觸發：第一層所需金額，並判斷目前流動現金是否足夠支付
  let bombardTriggered = false, bombardCost = null, bombardSufficient = null, bombardCostTxt = '';
  let layer2Cost = null, layer2CostTxt = '', bombardSufficientBoth = null;
  if(d.bombard && d.today){
    bombardTriggered = true;
    const basePrice = Math.min(d.today.close, d.today.ma20);
    const p1 = applyTick(basePrice, asset.roundTick, 'ceil');
    const p2 = applyTick(basePrice * P.layer2Mult, asset.roundTick, 'ceil');
    bombardCost = asset.l1 * p1;
    layer2Cost = asset.l2 * p2;
    bombardCostTxt = `${bombardCost.toLocaleString(undefined,{maximumFractionDigits: asset.roundTick?0:asset.priceDecimals})} ${unit}`;
    layer2CostTxt = `${layer2Cost.toLocaleString(undefined,{maximumFractionDigits: asset.roundTick?0:asset.priceDecimals})} ${unit}`;
    // 可動用資金＝流動現金 - 應保留金額（現金池保留部分不計入可用於重砲的資金）
    bombardSufficient = (requiredReserve == null) ? null : ((cur - requiredReserve) >= bombardCost);
    // 兩層都觸發時會同時掛單，所以要檢查現金夠不夠同時支付第一層＋第二層
    bombardSufficientBoth = (requiredReserve == null) ? null : ((cur - requiredReserve) >= (bombardCost + layer2Cost));
  }

  return { requiredReserve, requiredTxt, cur, unit, sufficient, bombardTriggered, bombardCost, bombardCostTxt, bombardSufficient, layer2Cost, layer2CostTxt, bombardSufficientBoth };
}

function getMa60UpLedState(d){
  if(!d.ready2) return { label:'MA60持平或向上', color:'var(--text-faint)', on:false };
  if(!d.hasMa60) return { label:'缺少MA60相關資料，無法判斷', color:'var(--text-faint)', on:false };
  return d.ma60upFlat
    ? { label:'MA60持平或向上', color:'var(--teal)', on:true }
    : { label:'MA60向下', color:'var(--red)', on:true };
}

function getPriceMa60LedState(d){
  if(!d.hasMa60Today) return { label:'缺少MA60相關資料，無法判斷', color:'var(--text-faint)', on:false };
  return d.priceAboveMa60
    ? { label:'價格站穩MA60', color:'var(--teal)', on:true }
    : { label:'收盤價低於MA60', color:'var(--red)', on:true };
}

function getDefenseLedState(d){
  if(!d.ready2) return { label:'防禦邊界安全', color:'var(--text-faint)', on:false };
  if(!d.hasMa60) return { label:'缺少MA60相關資料，無法判斷', color:'var(--text-faint)', on:false };
  if(d.defenseOk) return { label:'防禦邊界安全', color:'var(--teal)', on:true };
  return { label:'防禦邊界關閉', color:'var(--red)', on:true };
}

function getMarginLedState(d){
  const ms = d.marginStatus;
  if(!ms || !ms.applicable){
    return { label:'融資防禦邊界（不適用）', color:'var(--text-faint)' };
  }
  if(!ms.hasPrice){
    return { label:'融資防禦邊界（無融資部位）', color:'var(--text-faint)' };
  }
  return ms.safe
    ? { label:'融資維持率安全', color:'var(--teal)' }
    : { label:'⚠ 融資維持率過低，建議減碼融資部位', color:'var(--red)' };
}

function getCashLedState(cashStatus){
  if(cashStatus.sufficient === false){
    return { label:'流動現金不足', color:'var(--red)' };
  } else if(cashStatus.sufficient === true && cashStatus.bombardTriggered && cashStatus.bombardSufficient === false){
    return { label:'現金不足支付重砲', color:'var(--amber)' };
  } else if(cashStatus.sufficient === true && cashStatus.bombardTriggered && cashStatus.bombardSufficientBoth === false){
    return { label:'現金不足支付重砲第二層', color:'var(--amber)' };
  } else if(cashStatus.sufficient === true){
    return { label:'流動現金充足', color:'var(--teal)' };
  } else {
    return { label:'缺少現金相關資料，無法判斷', color:'var(--text-faint)' };
  }
}

function renderReserve(){
  const key = state.activeTab;

  document.getElementById('reserveTitle').textContent = '防禦邊界';

  const d = computeForAsset(key);
  if(!d.ready1){
    document.getElementById('reserveHint').innerHTML =
      `<span style="color:var(--text-faint);">尚無資料，請先在上方輸入今天的資料。</span>`;
    return;
  }

  const st = getCashStatus(key);
  let bombardLine = '';
  if(st.bombardTriggered){
    const available = (st.requiredReserve != null) ? (st.cur - st.requiredReserve) : null;
    const availableTxt = (available != null) ? `${available.toLocaleString()} ${st.unit}` : '—（尚無收盤價或股數資料）';
    bombardLine = `<br>可動用資金（流動現金－應保留金額）：${availableTxt}<br>重砲觸發：第一層所需金額：${st.bombardCostTxt}<br>重砲觸發：第二層所需金額：${st.layer2CostTxt}`;
  }
  const cashLed = getCashLedState(st);
  const defenseLed = getDefenseLedState(d);
  const ma60UpLed = getMa60UpLedState(d);
  const priceMa60Led = getPriceMa60LedState(d);
  const marginLed = getMarginLedState(d);

  let marginLine = '';
  if(d.marginStatus && d.marginStatus.hasPrice){
    const ms = d.marginStatus;
    const pctTxt = (ms.maintenanceRatio*100).toFixed(1);
    marginLine = `<br>融資買進均價：${fmt(ms.costPrice,2)}｜融資股數：${(ms.shares||0).toLocaleString()} 股` +
      `<br>融資維持率：${pctTxt}%｜融資追繳價：${fmt(ms.callPrice,2)}`;
  }

  const avgCostVal = state.avgCost[key] || 0;
  const srcTxt = d.exitThresholdSource === 'cost' ? '（依成本乘數）' : '（依MA20出清乘數）';
  let costLine = `<br>平均持股成本：${avgCostVal>0 ? fmt(avgCostVal,2) : '—（未輸入）'}｜出清價位：${fmt(d.exitThreshold,2)}${srcTxt}`;
  if(d.holdDays !== undefined){
    costLine += `<br>建倉起始日：${state.positionStart[key]}｜已持有：${d.holdDays}天（時間停損門檻${state.params.timeStopDays}天）`;
  }

  document.getElementById('reserveHint').innerHTML =
    `目前流動現金：${st.cur.toLocaleString()} ${st.unit}<br>目前股數：${(state.shares[key]||0).toLocaleString()} 股<br>` +
    `現金應保留：${st.requiredTxt}${bombardLine}${marginLine}${costLine}<br>` +
    `<span style="color:${ma60UpLed.color}; font-weight:700;">${ma60UpLed.label}</span><br>` +
    `<span style="color:${priceMa60Led.color}; font-weight:700;">${priceMa60Led.label}</span><br>` +
    `<span style="color:${cashLed.color}; font-weight:700;">${cashLed.label}</span><br>` +
    `<span style="color:${marginLed.color}; font-weight:700;">${marginLed.label}</span><br>` +
    `<span style="color:${defenseLed.color}; font-weight:700;">${defenseLed.label}</span>`;
}

          <select data-aidx="${idx}" data-afield="dcaMode">

            <option value="shares" ${a.dcaMode==='shares'?'selected':''}>股數</option>
          </select>
        </div>
      </div>
      <div class="grid2">
        <div class="field"><label>定期定額/股</label><input type="number" data-aidx="${idx}" data-afield="dcaValue" value="${a.dcaValue}"></div>
        <div class="field"><label>動能觸發加額</label><input type="number" data-aidx="${idx}" data-afield="boostValue" value="${a.boostValue}"></div>
      </div>
      <div class="grid2">
        <div class="field"><label>重砲觸發：第一層(股)</label><input type="number" data-aidx="${idx}" data-afield="l1" value="${a.l1}"></div>
        <div class="field"><label>重砲觸發：第二層(股)</label><input type="number" data-aidx="${idx}" data-afield="l2" value="${a.l2}"></div>
      </div>
      <div class="field"><label>價格取整單位（0＝不取整）</label><input type="number" data-aidx="${idx}" data-afield="roundTick" value="${a.roundTick}"></div>
      <div class="field"><label>證交所股票代號（僅台股上市股票可自動抓取，留空則不可用）</label><input type="text" data-aidx="${idx}" data-afield="stockNo" value="${a.stockNo||''}" placeholder="例：2330"></div>
    </div>
  `).join('');

  wrap.querySelectorAll('input,select').forEach(el=>{
    el.addEventListener('change', async (e)=>{
      const idx = parseInt(e.target.dataset.aidx, 10);
      const field = e.target.dataset.afield;
      let v = e.target.value;
      if(['dcaValue','boostValue','l1','l2','roundTick'].includes(field)) v = parseFloat(v) || 0;
      state.assets[idx][field] = v;
      await storageSet(KEY_ASSETS, state.assets);
      renderTabs();
      renderAll();
    });
  });
  wrap.querySelectorAll('[data-adel]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      const idx = parseInt(el.dataset.adel, 10);
      if(state.assets.length <= 1) return;
      const removedKey = state.assets[idx].key;
      state.assets.splice(idx, 1);
      await storageSet(KEY_ASSETS, state.assets);
      if(state.activeTab === removedKey){ state.activeTab = state.assets[0].key; }
      renderAssetManage();
      renderTabs();
      renderAll();
    });
  });
  wrap.querySelectorAll('[data-aup]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      const idx = parseInt(el.dataset.aup, 10);
      if(idx <= 0) return;
      [state.assets[idx-1], state.assets[idx]] = [state.assets[idx], state.assets[idx-1]];
      await storageSet(KEY_ASSETS, state.assets);
      renderAssetManage();
      renderTabs();
    });
  });
  wrap.querySelectorAll('[data-adown]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      const idx = parseInt(el.dataset.adown, 10);
      if(idx >= state.assets.length-1) return;
      [state.assets[idx+1], state.assets[idx]] = [state.assets[idx], state.assets[idx+1]];
      await storageSet(KEY_ASSETS, state.assets);
      renderAssetManage();
      renderTabs();
    });
  });
}

// ---------- custom calendar popover ----------
let calState = { viewYear:0, viewMonth:0, selected:'' };

function pad2(n){ return String(n).padStart(2,'0'); }
function toDateStr(y,m,d){ return `${y}-${pad2(m+1)}-${pad2(d)}`; }

function renderCalendar(){
  const {viewYear, viewMonth, selected} = calState;
  document.getElementById('calTitle').textContent = `${viewYear}年 ${viewMonth+1}月`;
  const dows = ['日','一','二','三','四','五','六'];
  let html = dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const daysInPrevMonth = new Date(viewYear, viewMonth, 0).getDate();
  const todayStr = new Date().toISOString().slice(0,10);

  for(let i=0;i<firstDay;i++){
    const d = daysInPrevMonth - firstDay + 1 + i;
    html += `<div class="cal-day other-month">${d}</div>`;
  }
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = toDateStr(viewYear, viewMonth, d);
    let cls = 'cal-day';
    if(dateStr === todayStr) cls += ' today';
    if(dateStr === selected) cls += ' selected';
    html += `<div class="${cls}" data-date="${dateStr}">${d}</div>`;
  }
  const totalCells = firstDay + daysInMonth;
  const trailing = (7 - (totalCells % 7)) % 7;
  for(let d=1; d<=trailing; d++){
    html += `<div class="cal-day other-month">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
}

function openCalendar(){
  const cur = document.getElementById('inDate').value || new Date().toISOString().slice(0,10);
  const [y,m] = cur.split('-').map(Number);
  calState.viewYear = y; calState.viewMonth = m-1; calState.selected = cur;
  renderCalendar();
  document.getElementById('calendarPop').classList.add('show');
}
function closeCalendar(){

// ---------- import history file ----------
function parseImportText(text){
  const lines = text.split(/\r?\n/);
  const result = {};
  const nameMap = {};
  let currentKey = null;
  for(const raw of lines){
    const line = raw.trim();
    if(!line) continue;
    if(line.startsWith('日期')) continue;
    if(line.includes('尚無資料')) continue;
    if(/^\d{4}-\d{2}-\d{2}\s/.test(line) || /^\d{4}-\d{2}-\d{2}$/.test(line)){
      if(!currentKey) continue;
      const parts = line.split(/\s+/);
      if(parts.length < 4) continue;
      const close = parseFloat(parts[1]);
      const ma5 = parseFloat(parts[2]);
      const ma20 = parseFloat(parts[3]);
      const ma60Raw = parts[4];
      const ma60 = (ma60Raw === undefined || ma60Raw === '—' || isNaN(parseFloat(ma60Raw))) ? null : parseFloat(ma60Raw);
      const cashRaw = parts[5];
      const cash = (cashRaw === undefined || cashRaw === '—' || isNaN(parseFloat(cashRaw))) ? null : parseFloat(cashRaw);
      const sharesRaw = parts[6];
      const shares = (sharesRaw === undefined || sharesRaw === '—' || isNaN(parseFloat(sharesRaw))) ? null : parseFloat(sharesRaw);
      if(isNaN(close) || isNaN(ma5) || isNaN(ma20)) continue;
      result[currentKey].push({ date: parts[0], close, ma5, ma20, ma60, cash, shares });
      continue;
    }
    // 不是資料列、不是表頭列，視為標的名稱／區段標題行
    // 相容舊格式【key：name (currency)】，也支援新格式的純標的名稱一行
    let label = line.replace(/^【|】$/g, '');
    let key = null, name = label;
    const m = label.match(/^([^:：]+)[:：]\s*(.+?)(\s*\([^)]*\))?$/);
    if(m){ key = m[1].trim(); name = m[2].trim(); }
    const existing = state.assets.find(a=> (key && a.key===key) || a.name===name);
    currentKey = existing ? existing.key : (key || name);
    result[currentKey] = result[currentKey] || [];
    nameMap[currentKey] = existing ? existing.name : name;
  }
  result.__names = nameMap;
  return result;
}

function mergeImportedLog(key, importedRows){
  const map = {};
  (state.log[key]||[]).forEach(r=>{ map[r.date] = r; });
  importedRows.forEach(r=>{ map[r.date] = r; });
  const merged = Object.values(map).sort((a,b)=> a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
  return merged.slice(-3);
}

document.getElementById('inImportFile').addEventListener('change', async (e)=>{
  const statusEl = document.getElementById('importStatus');
  const file = e.target.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    const parsed = parseImportText(text);
    const nameMap = parsed.__names || {};
    let importedCount = 0;
    const perKeyCount = {};
    for(const key of Object.keys(parsed)){
      if(key === '__names') continue;
      if(parsed[key].length === 0) continue;
      // 匯入的標的不在目前清單裡，自動新增一個預設設定的標的
      if(!state.assets.some(a=>a.key===key)){
        state.assets.push({ key, name:(nameMap[key] || key), currency:'', priceDecimals:2, roundTick:0, dcaMode:'shares', dcaValue:1, boostValue:1, l1:10, l2:10 });
        await storageSet(KEY_ASSETS, state.assets);
      }
      ensureAssetData(key);
      state.log[key] = mergeImportedLog(key, parsed[key]);
      importedCount += parsed[key].length;
      perKeyCount[key] = parsed[key].length;
      await storageSet(KEY_LOG(key), state.log[key]);

      const rows = sortedLog(key);
      for(let i=rows.length-1; i>=0; i--){
        if(rows[i].cash != null){
          state.cash[key] = rows[i].cash;
          await storageSet(KEY_CASH(key), rows[i].cash);
          break;
        }
      }
    }
    if(importedCount === 0){
      statusEl.innerHTML = `<span style="color:var(--red)">沒有偵測到符合格式的資料，請確認檔案內容是否為「匯出歷史紀錄」產生的格式。</span>`;
    } else {
      renderAssetManage();
      renderAll();
      document.getElementById('inCashNow').value = '';
      document.getElementById('inSharesNow').value = '';
      const curKey = state.activeTab;
      const curCount = perKeyCount[curKey] || 0;
      const curName = getAsset(curKey).name;
      if(curCount > 0){
        statusEl.innerHTML = `<span style="color:var(--teal)">✅ 匯入完成，${curName}讀取 ${curCount} 筆資料（只保留最近3天）。</span>`;
      } else {
        statusEl.innerHTML = `<span style="color:var(--teal)">✅ 匯入完成，但檔案中沒有${curName}的資料（已更新其他分頁）。</span>`;
      }
    }
  } catch(err){
    console.error('import failed', err);
    statusEl.innerHTML = `<span style="color:var(--red)">匯入失敗，請確認檔案格式是否正確。</span>`;
  }
  e.target.value = '';
});

  const ma20 = parseFloat(document.getElementById('inMa20').value);

    alert('請完整輸入日期、收盤價、MA5、MA20');
    return;
  }
  if(ma60Raw !== '' && isNaN(parseFloat(ma60Raw))){
    alert('MA60格式錯誤');
    return;
  }
  const ma60 = ma60Raw === '' ? null : parseFloat(ma60Raw);
  const key = state.activeTab;
  const existingIdx = state.log[key].findIndex(r=>r.date===date);
  // 現金不再透過這裡寫入歷史紀錄，改由「目前現金」區塊獨立更新；
  // 若該日期原本就有紀錄，保留原本的cash欄位，不因這次操作被清空
  const prevCash = existingIdx >= 0 ? state.log[key][existingIdx].cash : null;
  if(existingIdx >= 0){
    state.log[key][existingIdx] = {date, close, ma5, ma20, ma60, cash: prevCash};
  } else {
    state.log[key].push({date, close, ma5, ma20, ma60, cash: prevCash});
  }
  // 只保留最近3天的紀錄，超過的自動移除
  state.log[key] = sortedLog(key).slice(-3);
  await storageSet(KEY_LOG(key), state.log[key]);

  document.getElementById('inClose').value = '';
  document.getElementById('inMa5').value = '';
  document.getElementById('inMa20').value = '';
  document.getElementById('inMa60').value = '';
  renderAll();
});

document.getElementById('inImportAssets').addEventListener('change', async (e)=>{
  const statusEl = document.getElementById('assetImportStatus');
  const file = e.target.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    // 新格式：{ params, assets }；舊格式：純標的陣列（維持相容）
    const assetsArr = Array.isArray(parsed) ? parsed : parsed.assets;
    const paramsObj = Array.isArray(parsed) ? null : parsed.params;
    if(!Array.isArray(assetsArr) || assetsArr.length === 0 || !assetsArr.every(a=>a && typeof a.key === 'string' && typeof a.name === 'string')){
      throw new Error('format');
    }
    let addedCount = 0, updatedCount = 0;
    assetsArr.forEach(imported=>{
      const clean = {
        key: imported.key,
        name: imported.name || imported.key,
        currency: imported.currency || '',
        priceDecimals: (typeof imported.priceDecimals === 'number') ? imported.priceDecimals : 2,
        roundTick: (typeof imported.roundTick === 'number') ? imported.roundTick : 0,
        dcaMode: imported.dcaMode === 'amount' ? 'amount' : 'shares',
        dcaValue: parseFloat(imported.dcaValue) || 0,
        boostValue: parseFloat(imported.boostValue) || 0,
        l1: parseFloat(imported.l1) || 0,
        l2: parseFloat(imported.l2) || 0,
        stockNo: imported.stockNo || '',
      };
      const existIdx = state.assets.findIndex(a=>a.key===clean.key);
      if(existIdx >= 0){
        state.assets[existIdx] = clean;
        updatedCount++;
      } else {
        state.assets.push(clean);
        addedCount++;
      }
      ensureAssetData(clean.key);
    });
    await storageSet(KEY_ASSETS, state.assets);

    let paramsUpdated = false;
    if(paramsObj && typeof paramsObj === 'object'){
      state.params = Object.assign({}, DEFAULT_PARAMS, paramsObj);
      await storageSet(KEY_PARAMS, state.params);
      paramsUpdated = true;
    }

    renderParamsModal();
    renderAssetManage();
    renderTabs();
    renderAll();
    const paramsNote = paramsUpdated ? '，全域參數也一併更新' : '';
    statusEl.innerHTML = `<span style="color:var(--teal)">✅ 匯入完成，新增 ${addedCount} 個、更新 ${updatedCount} 個標的設定${paramsNote}。</span>`;
  } catch(err){
    console.error('asset import failed', err);
    statusEl.innerHTML = `<span style="color:var(--red)">匯入失敗，請確認檔案是否為「匯出標的設定」產生的.json格式。</span>`;
  }
  e.target.value = '';
});

// 沙盒環境中 window.confirm 可能被封鎖而沒有反應，改用「再次點擊確認」機制
function armConfirmClick(el, originalText, confirmText, onConfirm){
  let armed = false;
  let timer = null;
  el.addEventListener('click', async (e)=>{
    e.stopPropagation();
    if(!armed){
      armed = true;
      el.textContent = confirmText;
      timer = setTimeout(()=>{ armed = false; el.textContent = originalText; }, 3000);
    } else {
      clearTimeout(timer);
      armed = false;
      el.textContent = originalText;
      await onConfirm();
    }
  });
}

    renderParamsModal();

);

// ---------- init ----------
(async function init(){
  const todayStr = new Date().toISOString().slice(0,10);
  document.getElementById('inDate').value = todayStr;
  document.getElementById('btStartDate').max = todayStr;

  const savedParams = await storageGet(KEY_PARAMS, {});
  state.params = Object.assign({}, DEFAULT_PARAMS, savedParams);

  const savedAssets = await storageGet(KEY_ASSETS, null);
  state.assets = (savedAssets && savedAssets.length) ? savedAssets : DEFAULT_ASSETS.map(a=>({...a}));
  state.activeTab = state.assets[0].key;

  for(const a of state.assets){
    ensureAssetData(a.key);
    state.log[a.key] = await storageGet(KEY_LOG(a.key), []);
    state.cash[a.key] = await storageGet(KEY_CASH(a.key), 0);
    state.shares[a.key] = await storageGet(KEY_SHARES(a.key), 0);
    state.marginCost[a.key] = await storageGet(KEY_MARGIN_COST(a.key), 0);
    state.marginShares[a.key] = await storageGet(KEY_MARGIN_SHARES(a.key), 0);
    state.avgCost[a.key] = await storageGet(KEY_AVG_COST(a.key), 0);
    state.positionStart[a.key] = await storageGet(KEY_POSITION_START(a.key), '');
  }

  renderAll();
})();
